<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Periodic Table - 元素周期表</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>元素周期表</h1>
            <p class="subtitle">Periodic Table of Elements</p>
        </header>

        <main>
            <!-- Search & Filter -->
            <div class="controls-card">
                <div class="search-box">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="text" id="searchInput" placeholder="搜索元素名称或符号...">
                </div>
                <div class="filter-tabs" id="filterTabs">
                    <button class="filter-tab active" data-filter="all">全部</button>
                    <button class="filter-tab" data-filter="solid">固体</button>
                    <button class="filter-tab" data-filter="liquid">液体</button>
                    <button class="filter-tab" data-filter="gas">气体</button>
                    <button class="filter-tab" data-filter="synthetic">人造</button>
                </div>
            </div>

            <!-- Periodic Table -->
            <div class="table-container">
                <div class="periodic-table" id="periodicTable">
                    <!-- Generated by JS -->
                </div>
            </div>

            <!-- Legend -->
            <div class="legend-card">
                <h3>元素分类</h3>
                <div class="legend-grid" id="legendGrid">
                    <!-- Generated by JS -->
                </div>
            </div>
        </main>

        <footer>
            <p>点击元素查看详情</p>
        </footer>
    </div>

    <!-- Element Detail Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div class="modal-header">
                <div class="modal-symbol" id="modalSymbol">H</div>
                <div class="modal-info">
                    <h2 id="modalName">氢</h2>
                    <p id="modalNameEn">Hydrogen</p>
                </div>
            </div>
            <div class="modal-body">
                <div class="modal-grid">
                    <div class="modal-item">
                        <span class="modal-label">原子序数</span>
                        <span class="modal-value" id="modalNumber">1</span>
                    </div>
                    <div class="modal-item">
                        <span class="modal-label">相对原子质量</span>
                        <span class="modal-value" id="modalMass">1.008</span>
                    </div>
                    <div class="modal-item">
                        <span class="modal-label">电子排布</span>
                        <span class="modal-value" id="modalElectron">1s¹</span>
                    </div>
                    <div class="modal-item">
                        <span class="modal-label">发现年份</span>
                        <span class="modal-value" id="modalYear">1766</span>
                    </div>
                    <div class="modal-item">
                        <span class="modal-label">状态</span>
                        <span class="modal-value" id="modalState">气体</span>
                    </div>
                    <div class="modal-item">
                        <span class="modal-label">分类</span>
                        <span class="modal-value" id="modalCategory">非金属</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
