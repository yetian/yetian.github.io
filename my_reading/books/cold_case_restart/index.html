        <section class="content-section">
            <h2>书籍介绍</h2>
            <p>《冷案重启》是一部冷案侦查题材的推理小说。故事围绕专门负责重启悬而未决旧案的团队展开，通过抽丝剥茧的调查，揭开尘封多年的真相。</p>
        </section>
        <section class="content-section review-section">
            <h2>读后感</h2>
            <p>整体不错，只要不看后面的外传就没问题——那个外传实在是不行，画风突变，破坏了整个故事的完整性。</p>
            <p>主线案件的推理设计精巧，逻辑严密，节奏把控得当。冷案这个设定让故事多了一层历史的厚重感：那些被遗忘的真相、那些无法伸张的正义，在岁月的尘埃中等待被重新发现。建议阅读完主线后直接收尾，把外传当作不存在，这样能保持对这个故事的好印象。</p>
        </section>
