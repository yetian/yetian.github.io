<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的书架</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <header class="header">
            <h1>我的书架</h1>
            <p class="subtitle">记录阅读，沉淀思考</p>
            <div class="stats">
                <div class="stat-item">
                    <span class="number" id="totalBooks">0</span>
                    <span class="label">本书</span>
                </div>
            </div>
        </header>

        <div class="toolbar">
            <div class="search-box">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" id="searchInput" placeholder="搜索书名、作者或关键词...">
            </div>

            <div class="sort-control">
                <select id="sortSelect" class="sort-select">
                    <option value="addedDate-desc">最新添加</option>
                    <option value="addedDate-asc">最早添加</option>
                    <option value="readDate-desc">最近读完</option>
                    <option value="readDate-asc">最早读完</option>
                    <option value="title-asc">书名 A-Z</option>
                    <option value="title-desc">书名 Z-A</option>
                    <option value="year-desc">最新出版</option>
                    <option value="year-asc">最早出版</option>
                </select>
            </div>

            <div class="view-toggle">
                <button class="view-btn active" data-view="mini" title="缩略图视图">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="5" height="5"/>
                        <rect x="10" y="3" width="5" height="5"/>
                        <rect x="17" y="3" width="4" height="5"/>
                        <rect x="3" y="10" width="5" height="5"/>
                        <rect x="10" y="10" width="5" height="5"/>
                        <rect x="17" y="10" width="4" height="5"/>
                        <rect x="3" y="17" width="5" height="4"/>
                        <rect x="10" y="17" width="5" height="4"/>
                        <rect x="17" y="17" width="4" height="4"/>
                    </svg>
                </button>
                <button class="view-btn" data-view="gallery" title="画廊视图">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"/>
                        <rect x="14" y="3" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/>
                    </svg>
                </button>
                <button class="view-btn" data-view="list" title="列表视图">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="8" y1="6" x2="21" y2="6"/>
                        <line x1="8" y1="12" x2="21" y2="12"/>
                        <line x1="8" y1="18" x2="21" y2="18"/>
                        <line x1="3" y1="6" x2="3.01" y2="6"/>
                        <line x1="3" y1="12" x2="3.01" y2="12"/>
                        <line x1="3" y1="18" x2="3.01" y2="18"/>
                    </svg>
                </button>
                <button class="view-btn" data-view="flow" title="封面流视图">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18l6-6-6-6"/>
                        <rect x="3" y="4" width="5" height="16" rx="1"/>
                        <rect x="16" y="4" width="5" height="16" rx="1"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="category-filter" id="categoryFilter">
            <!-- Categories will be loaded here -->
        </div>

        <main class="book-grid" id="bookGrid">
            <!-- Books will be loaded here -->
        </main>

        <div class="loading-indicator" id="loadingIndicator" style="display: none;">
            加载更多书籍
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
