<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 编码/解码工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>Base64 编码/解码</h1>
            <p class="subtitle">支持 UTF-8 编码，实时转换</p>
        </header>

        <main>
            <div class="mode-card">
                <div class="mode-tabs">
                    <button class="mode-tab active" data-mode="encode">编码</button>
                    <button class="mode-tab" data-mode="decode">解码</button>
                </div>
            </div>

            <div class="input-card">
                <div class="card-header">
                    <h3>输入</h3>
                    <div class="header-actions">
                        <button class="action-btn" id="clearBtn" title="清空">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                            </svg>
                        </button>
                        <button class="action-btn" id="swapBtn" title="交换">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="textarea-wrapper">
                    <textarea id="inputText" placeholder="在此输入文本或拖放文件..."></textarea>
                    <div class="drop-overlay" id="dropOverlay">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                        </svg>
                        <span>释放以读取文件</span>
                    </div>
                </div>
                <div class="input-info">
                    <span id="inputInfo">0 字符</span>
                </div>
            </div>

            <div class="output-card">
                <div class="card-header">
                    <h3>输出</h3>
                    <div class="header-actions">
                        <button class="action-btn" id="copyBtn" title="复制">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <textarea id="outputText" placeholder="转换结果将显示在这里..." readonly></textarea>
                <div class="output-info">
                    <span id="outputInfo">0 字符</span>
                </div>
            </div>

            <div class="info-card">
                <div class="info-item">
                    <span class="info-label">当前模式</span>
                    <span class="info-value" id="currentMode">编码</span>
                </div>
                <div class="info-item">
                    <span class="info-label">编码方式</span>
                    <span class="info-value">UTF-8</span>
                </div>
            </div>
        </main>

        <footer>
            <p>支持中文等多字节字符 | 所有数据本地处理，不上传服务器</p>
        </footer>
    </div>

    <div class="notification" id="notification"></div>

    <script src="script.js"></script>
</body>
</html>
