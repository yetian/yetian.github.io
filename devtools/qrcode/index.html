<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码生成器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>二维码生成器</h1>
            <p class="subtitle">输入文本或链接，生成高清二维码</p>
        </header>

        <main>
            <div class="input-card">
                <div class="card-header">
                    <h3>输入内容</h3>
                    <button class="action-btn" id="clearBtn" title="清空">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                        </svg>
                    </button>
                </div>
                <textarea id="inputText" placeholder="输入文本、网址或任意内容..."></textarea>
                <div class="input-info">
                    <span id="inputInfo">0 字符</span>
                </div>
            </div>

            <div class="options-card">
                <h3>生成选项</h3>
                <div class="options-grid">
                    <div class="option-group">
                        <label>尺寸</label>
                        <div class="btn-group" id="sizeGroup">
                            <button class="opt-btn active" data-size="small">小</button>
                            <button class="opt-btn" data-size="medium">中</button>
                            <button class="opt-btn" data-size="large">大</button>
                        </div>
                    </div>

                    <div class="option-group">
                        <label>纠错等级</label>
                        <div class="btn-group" id="errorGroup">
                            <button class="opt-btn" data-level="L">L (7%)</button>
                            <button class="opt-btn active" data-level="M">M (15%)</button>
                            <button class="opt-btn" data-level="Q">Q (25%)</button>
                            <button class="opt-btn" data-level="H">H (30%)</button>
                        </div>
                    </div>

                    <div class="option-group color-option">
                        <label>前景色</label>
                        <div class="color-picker-wrapper">
                            <input type="color" id="fgColor" value="#000000">
                            <span class="color-value" id="fgColorValue">#000000</span>
                        </div>
                    </div>

                    <div class="option-group color-option">
                        <label>背景色</label>
                        <div class="color-picker-wrapper">
                            <input type="color" id="bgColor" value="#ffffff">
                            <span class="color-value" id="bgColorValue">#ffffff</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="preview-card">
                <div class="card-header">
                    <h3>预览</h3>
                </div>
                <div class="qr-preview" id="qrPreview">
                    <div class="placeholder">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="7" height="7" rx="1"/>
                            <rect x="14" y="3" width="7" height="7" rx="1"/>
                            <rect x="3" y="14" width="7" height="7" rx="1"/>
                            <rect x="14" y="14" width="3" height="3"/>
                            <rect x="18" y="14" width="3" height="3"/>
                            <rect x="14" y="18" width="3" height="3"/>
                            <rect x="18" y="18" width="3" height="3"/>
                        </svg>
                        <span>输入内容后生成二维码</span>
                    </div>
                    <canvas id="qrCanvas"></canvas>
                </div>
            </div>

            <div class="actions-card">
                <button class="action-btn primary" id="downloadBtn" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                    </svg>
                    下载 PNG
                </button>
                <button class="action-btn secondary" id="copyBtn" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                        <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                    </svg>
                    复制到剪贴板
                </button>
            </div>
        </main>

        <footer>
            <p>所有数据本地处理，不上传服务器</p>
        </footer>
    </div>

    <div class="notification" id="notification"></div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
