<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG 查看器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --dark: #0a0a0f;
            --dark-light: #13131a;
            --surface: #18181f;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { font-family: 'Outfit', sans-serif; background: var(--dark); min-height: 100vh; color: var(--text); overflow-x: hidden; }

        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; animation: float 20s ease-in-out infinite; }
        .orb-1 { width: 400px; height: 400px; background: var(--primary); top: -100px; right: -100px; }
        .orb-2 { width: 300px; height: 300px; background: var(--secondary); bottom: -50px; left: -50px; animation-delay: -5s; }
        .orb-3 { width: 250px; height: 250px; background: var(--accent); top: 50%; left: 50%; margin-top: -125px; margin-left: -125px; animation-delay: -10s; opacity: 0.2; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(30px, -30px); }
            50% { transform: translate(-20px, 20px); }
            75% { transform: translate(20px, 30px); }
        }

        .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 2rem; }

        header { text-align: center; margin-bottom: 2rem; }
        header h1 { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-muted); }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
        @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } .container { padding: 1rem; } header h1 { font-size: 1.5rem; } }

        .panel { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 1.25rem; }

        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--glass-border); }
        .panel-title { font-weight: 600; font-size: 0.95rem; }

        textarea { width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--glass-border); border-radius: 12px; padding: 1rem; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; resize: vertical; min-height: 280px; transition: border-color 0.2s; }
        textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }

        .preview-box { min-height: 280px; background: rgba(0, 0, 0, 0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .preview-box svg { max-width: 100%; max-height: 100%; }

        .toolbar { display: flex; gap: 0.75rem; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }

        button { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; border-radius: 12px; padding: 0.65rem 1.25rem; font-family: inherit; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }

        .btn-secondary { background: var(--glass); border: 1px solid var(--glass-border); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); box-shadow: none; transform: none; }

        .bg-options { display: flex; gap: 0.35rem; }
        .bg-options button { width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center; }
        .bg-options button.active { box-shadow: 0 0 0 2px var(--primary); }
        .bg-transparent { background: repeating-conic-gradient(#808080 0% 25%, #404040 0% 50%) 50% / 10px 10px !important; }
        .bg-white { background: #fff !important; }
        .bg-black { background: #000 !important; }

        .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-top: 1rem; }
        .info-item { background: rgba(0, 0, 0, 0.2); padding: 0.75rem; border-radius: 10px; text-align: center; }
        .info-label { color: var(--text-muted); font-size: 0.75rem; }
        .info-value { font-weight: 600; margin-top: 0.25rem; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>🖼️ SVG 查看器</h1>
            <p class="subtitle">预览 SVG 代码，查看图形信息</p>
        </header>

        <div class="toolbar">
            <button onclick="loadSample()">加载示例</button>
            <button class="btn-secondary" onclick="downloadSVG()">下载 SVG</button>
            <button class="btn-secondary" onclick="copySVG()">复制代码</button>
            <button class="btn-secondary" onclick="clearAll()">清空</button>
            <div style="margin-left: auto; display: flex; gap: 0.5rem; align-items: center;">
                <span style="color: var(--text-muted); font-size: 0.85rem;">背景:</span>
                <div class="bg-options">
                    <button class="bg-transparent active" onclick="setBg('transparent', this)" title="透明"></button>
                    <button class="bg-white" onclick="setBg('#ffffff', this)" title="白色"></button>
                    <button class="bg-black" onclick="setBg('#000000', this)" title="黑色"></button>
                </div>
            </div>
        </div>

        <div class="main-grid">
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">SVG 代码</span>
                </div>
                <textarea id="svgInput" placeholder="粘贴 SVG 代码..."></textarea>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">预览</span>
                </div>
                <div class="preview-box" id="previewBox">
                    <span style="color: var(--text-muted);">在左侧输入 SVG 代码</span>
                </div>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">宽度</div>
                        <div class="info-value" id="infoWidth">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">高度</div>
                        <div class="info-value" id="infoHeight">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">元素数</div>
                        <div class="info-value" id="infoElements">-</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        const sampleSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="45" fill="url(#grad)"/>
  <text x="50" y="58" text-anchor="middle" fill="white" font-size="24" font-family="Arial">SVG</text>
</svg>`;

        function renderSVG() {
            const svgCode = document.getElementById('svgInput').value;
            const previewBox = document.getElementById('previewBox');

            if (!svgCode.trim()) {
                previewBox.innerHTML = '<span style="color: var(--text-muted);">在左侧输入 SVG 代码</span>';
                resetInfo();
                return;
            }

            try {
                previewBox.innerHTML = svgCode;
                updateInfo();
            } catch (e) {
                previewBox.innerHTML = '<span style="color: #ef4444;">解析错误: ' + e.message + '</span>';
                resetInfo();
            }
        }

        function updateInfo() {
            const svg = document.querySelector('#previewBox svg');
            if (svg) {
                const width = svg.getAttribute('width') || svg.viewBox?.baseVal?.width || '-';
                const height = svg.getAttribute('height') || svg.viewBox?.baseVal?.height || '-';
                const elements = svg.querySelectorAll('*').length;

                document.getElementById('infoWidth').textContent = width;
                document.getElementById('infoHeight').textContent = height;
                document.getElementById('infoElements').textContent = elements;
            }
        }

        function resetInfo() {
            document.getElementById('infoWidth').textContent = '-';
            document.getElementById('infoHeight').textContent = '-';
            document.getElementById('infoElements').textContent = '-';
        }

        window.setBg = function(color, btn) {
            const previewBox = document.getElementById('previewBox');
            document.querySelectorAll('.bg-options button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (color === 'transparent') {
                previewBox.style.background = "repeating-conic-gradient(#808080 0% 25%, #404040 0% 50%) 50% / 16px 16px";
            } else {
                previewBox.style.background = color;
            }
        };

        window.loadSample = function() {
            document.getElementById('svgInput').value = sampleSVG;
            renderSVG();
        };

        window.downloadSVG = function() {
            const svgCode = document.getElementById('svgInput').value;
            if (!svgCode.trim()) return;

            const blob = new Blob([svgCode], { type: 'image/svg+xml' });
            const link = document.createElement('a');
            link.download = 'image.svg';
            link.href = URL.createObjectURL(blob);
            link.click();
            URL.revokeObjectURL(link.href);
        };

        window.copySVG = function() {
            const svgCode = document.getElementById('svgInput').value;
            if (svgCode.trim()) navigator.clipboard.writeText(svgCode);
        };

        window.clearAll = function() {
            document.getElementById('svgInput').value = '';
            renderSVG();
        };

        document.getElementById('svgInput').addEventListener('input', renderSVG);
    })();
    </script>
</body>
</html>
