<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片压缩器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>图片压缩器</h1>
            <p class="subtitle">拖拽或选择图片，快速压缩优化</p>
        </header>

        <main>
            <div class="upload-card" id="uploadCard">
                <div class="upload-zone" id="uploadZone">
                    <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" hidden>
                    <div class="upload-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </div>
                    <p class="upload-text">拖拽图片到此处或点击选择</p>
                    <p class="upload-hint">支持 PNG、JPG、WebP 格式</p>
                </div>
            </div>

            <div class="options-card" id="optionsCard" style="display: none;">
                <h3>压缩选项</h3>
                <div class="options-grid">
                    <div class="option-group">
                        <label>输出格式</label>
                        <div class="btn-group" id="formatGroup">
                            <button class="opt-btn active" data-format="jpeg">JPG</button>
                            <button class="opt-btn" data-format="png">PNG</button>
                            <button class="opt-btn" data-format="webp">WebP</button>
                        </div>
                    </div>

                    <div class="option-group">
                        <label>图片质量</label>
                        <div class="quality-slider">
                            <input type="range" id="qualitySlider" min="0" max="100" value="80">
                            <div class="quality-value">
                                <span id="qualityValue">80</span>%
                            </div>
                        </div>
                    </div>

                    <div class="option-group full-width">
                        <label>尺寸调整 (可选)</label>
                        <div class="resize-options">
                            <label class="checkbox-label">
                                <input type="checkbox" id="resizeCheck">
                                <span>启用尺寸调整</span>
                            </label>
                            <div class="resize-inputs" id="resizeInputs" style="display: none;">
                                <div class="input-group">
                                    <input type="number" id="widthInput" placeholder="宽度">
                                    <span>×</span>
                                    <input type="number" id="heightInput" placeholder="高度">
                                    <span>px</span>
                                </div>
                                <label class="checkbox-label small">
                                    <input type="checkbox" id="keepRatio" checked>
                                    <span>保持比例</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="preview-card" id="previewCard" style="display: none;">
                <h3>预览对比</h3>
                <div class="preview-grid">
                    <div class="preview-item">
                        <div class="preview-header">
                            <span class="preview-label">原图</span>
                            <span class="preview-size" id="originalSize">-</span>
                        </div>
                        <div class="preview-image">
                            <img id="originalPreview" alt="原图">
                        </div>
                    </div>
                    <div class="preview-item">
                        <div class="preview-header">
                            <span class="preview-label">压缩后</span>
                            <span class="preview-size" id="compressedSize">-</span>
                        </div>
                        <div class="preview-image">
                            <img id="compressedPreview" alt="压缩后">
                        </div>
                    </div>
                </div>
                <div class="compression-info">
                    <div class="info-item">
                        <span class="info-label">压缩率</span>
                        <span class="info-value" id="compressionRatio">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">尺寸</span>
                        <span class="info-value" id="dimensions">-</span>
                    </div>
                </div>
            </div>

            <div class="actions-card" id="actionsCard" style="display: none;">
                <button class="action-btn secondary" id="resetBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                    </svg>
                    重新选择
                </button>
                <button class="action-btn primary" id="downloadBtn" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                    </svg>
                    下载压缩图片
                </button>
            </div>
        </main>

        <footer>
            <p>所有图片本地处理，不上传服务器</p>
        </footer>
    </div>

    <div class="notification" id="notification"></div>

    <script src="script.js"></script>
</body>
</html>
