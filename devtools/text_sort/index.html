<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本排序工具 | Text Sort</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>文本排序工具</h1>
            <p class="subtitle">快速排序、去重、整理文本行</p>
        </header>

        <main>
            <div class="card">
                <div class="section">
                    <label class="section-label">输入文本</label>
                    <textarea id="inputText" placeholder="每行一个条目，支持中文、英文、数字..."></textarea>
                </div>

                <div class="options-section">
                    <label class="section-label">排序选项</label>
                    <div class="sort-options">
                        <button class="sort-btn active" data-sort="az">A-Z 升序</button>
                        <button class="sort-btn" data-sort="za">Z-A 降序</button>
                        <button class="sort-btn" data-sort="natural">自然排序</button>
                        <button class="sort-btn" data-sort="numeric">数字排序</button>
                        <button class="sort-btn" data-sort="reverse">反转顺序</button>
                    </div>
                </div>

                <div class="toggles-section">
                    <label class="toggle-item">
                        <input type="checkbox" id="removeDuplicates">
                        <span class="toggle-slider"></span>
                        <span class="toggle-label">去除重复行</span>
                    </label>
                    <label class="toggle-item">
                        <input type="checkbox" id="trimWhitespace" checked>
                        <span class="toggle-slider"></span>
                        <span class="toggle-label">去除首尾空白</span>
                    </label>
                    <label class="toggle-item">
                        <input type="checkbox" id="ignoreCase">
                        <span class="toggle-slider"></span>
                        <span class="toggle-label">忽略大小写</span>
                    </label>
                </div>

                <div class="action-buttons">
                    <button class="btn primary" id="sortBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="4" y1="6" x2="20" y2="6"></line>
                            <line x1="4" y1="12" x2="14" y2="12"></line>
                            <line x1="4" y1="18" x2="8" y2="18"></line>
                        </svg>
                        排序
                    </button>
                    <button class="btn secondary" id="clearBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18"></path>
                            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path>
                        </svg>
                        清空
                    </button>
                </div>
            </div>

            <div class="card output-card">
                <div class="output-header">
                    <label class="section-label">输出结果</label>
                    <div class="stats">
                        <span id="lineCount">0 行</span>
                        <span class="divider">|</span>
                        <span id="charCount">0 字符</span>
                    </div>
                </div>
                <textarea id="outputText" readonly placeholder="排序结果将显示在这里..."></textarea>
                <div class="output-actions">
                    <button class="btn copy-btn" id="copyBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        复制结果
                    </button>
                </div>
            </div>
        </main>

        <footer>
            <p>高效整理文本数据</p>
        </footer>
    </div>

    <div class="notification" id="notification">
        <div class="notification-content">
            <span class="notification-icon">✓</span>
            <span class="notification-text">已复制到剪贴板</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
