<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本统计工具 | Text Stats</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>文本统计工具</h1>
            <p class="subtitle">实时分析文本各项指标</p>
        </header>

        <main>
            <div class="input-card">
                <textarea id="textInput" placeholder="在此输入或粘贴文本..."></textarea>
                <div class="input-footer">
                    <button class="clear-btn" id="clearBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        </svg>
                        清空
                    </button>
                </div>
            </div>

            <div class="stats-section">
                <h3>基础统计</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 7V4h16v3"/>
                                <path d="M9 20h6"/>
                                <path d="M12 4v16"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" id="charCount">0</span>
                            <span class="stat-label">字符数</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2"/>
                                <path d="M7 7h10"/>
                                <path d="M7 12h10"/>
                                <path d="M7 17h10"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" id="charNoSpace">0</span>
                            <span class="stat-label">字符数(无空格)</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 20h9"/>
                                <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" id="wordCount">0</span>
                            <span class="stat-label">词/字数</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 6h18"/>
                                <path d="M3 12h18"/>
                                <path d="M3 18h18"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" id="lineCount">0</span>
                            <span class="stat-label">行数</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M12 6v6l4 2"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" id="sentenceCount">0</span>
                            <span class="stat-label">句子数</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                                <polyline points="14 2 14 8 20 8"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value" id="paragraphCount">0</span>
                            <span class="stat-label">段落数</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="reading-time-card">
                <h3>阅读时间估算</h3>
                <div class="reading-time-content">
                    <div class="reading-item">
                        <span class="reading-label">中文</span>
                        <span class="reading-value" id="readingTimeZh">0 分钟</span>
                    </div>
                    <div class="reading-divider"></div>
                    <div class="reading-item">
                        <span class="reading-label">英文</span>
                        <span class="reading-value" id="readingTimeEn">0 分钟</span>
                    </div>
                </div>
            </div>

            <div class="frequency-card">
                <h3>字符频率排行 (Top 10)</h3>
                <div class="frequency-list" id="frequencyList">
                    <div class="empty-state">输入文本后显示频率统计</div>
                </div>
            </div>
        </main>

        <footer>
            <p>实时统计 · 快速分析</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
