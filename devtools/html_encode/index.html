<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 实体编码/解码工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>HTML 实体编码/解码</h1>
            <p class="subtitle">HTML Entity Encoder / Decoder</p>
        </header>

        <main>
            <!-- Mode Selection -->
            <div class="mode-card">
                <h3>转换模式</h3>
                <div class="mode-tabs" id="modeTabs">
                    <button class="mode-tab active" data-mode="encode">编码 Encode</button>
                    <button class="mode-tab" data-mode="decode">解码 Decode</button>
                </div>
            </div>

            <!-- Options -->
            <div class="options-card">
                <h3>编码选项</h3>
                <div class="option-group">
                    <label class="radio-label">
                        <input type="radio" name="entityType" value="named" checked>
                        <span class="radio-custom"></span>
                        <span class="radio-text">命名实体 (如 &amp;lt; &amp;gt; &amp;amp;)</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="entityType" value="numeric">
                        <span class="radio-custom"></span>
                        <span class="radio-text">数字实体 (如 &amp;#60; &amp;#62; &amp;#38;)</span>
                    </label>
                </div>
                <p class="option-hint" id="optionHint">命名实体使用预定义名称，更易阅读</p>
            </div>

            <!-- Character Selection -->
            <div class="options-card">
                <h3>编码字符</h3>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="chars" value="special" checked>
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-text">特殊字符 (&lt; &gt; &amp; &quot; &apos;)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="chars" value="symbols">
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-text">常用符号 (© ® ™ € £ ¥)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="chars" value="chinese">
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-text">中文字符 (转为数字实体)</span>
                    </label>
                </div>
            </div>

            <!-- Input -->
            <div class="textarea-card">
                <div class="textarea-header">
                    <h3>输入内容</h3>
                    <div class="char-count" id="inputCount">0 字符</div>
                </div>
                <textarea id="inputText" placeholder="请输入要转换的内容..."></textarea>
            </div>

            <!-- Actions -->
            <div class="actions-card">
                <button class="action-btn swap-btn" id="swapBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="17 1 21 5 17 9"></polyline>
                        <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                        <polyline points="7 23 3 19 7 15"></polyline>
                        <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                    </svg>
                    交换内容
                </button>
                <button class="action-btn clear-btn" id="clearBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                    清空
                </button>
            </div>

            <!-- Output -->
            <div class="textarea-card">
                <div class="textarea-header">
                    <h3>输出结果</h3>
                    <div class="char-count" id="outputCount">0 字符</div>
                </div>
                <textarea id="outputText" placeholder="转换结果将显示在这里..." readonly></textarea>
                <button class="copy-btn" id="copyBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    复制结果
                </button>
            </div>

            <!-- Reference Table -->
            <div class="reference-card">
                <h3>常用实体参考</h3>
                <div class="reference-table">
                    <div class="reference-row header">
                        <span>字符</span>
                        <span>命名实体</span>
                        <span>数字实体</span>
                    </div>
                    <div class="reference-row">
                        <span>&lt;</span>
                        <span>&amp;lt;</span>
                        <span>&amp;#60;</span>
                    </div>
                    <div class="reference-row">
                        <span>&gt;</span>
                        <span>&amp;gt;</span>
                        <span>&amp;#62;</span>
                    </div>
                    <div class="reference-row">
                        <span>&amp;</span>
                        <span>&amp;amp;</span>
                        <span>&amp;#38;</span>
                    </div>
                    <div class="reference-row">
                        <span>"</span>
                        <span>&amp;quot;</span>
                        <span>&amp;#34;</span>
                    </div>
                    <div class="reference-row">
                        <span>'</span>
                        <span>&amp;apos;</span>
                        <span>&amp;#39;</span>
                    </div>
                    <div class="reference-row">
                        <span>&copy;</span>
                        <span>&amp;copy;</span>
                        <span>&amp;#169;</span>
                    </div>
                    <div class="reference-row">
                        <span>&reg;</span>
                        <span>&amp;reg;</span>
                        <span>&amp;#174;</span>
                    </div>
                    <div class="reference-row">
                        <span>&trade;</span>
                        <span>&amp;trade;</span>
                        <span>&amp;#8482;</span>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>实时转换 · 本地处理</p>
        </footer>
    </div>

    <div class="notification" id="notification">
        <span class="notification-text" id="notificationText">已复制</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
