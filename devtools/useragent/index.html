<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UserAgent 解析器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>UserAgent 解析器</h1>
            <p class="subtitle">解析浏览器标识字符串，识别浏览器、操作系统与设备信息</p>
        </header>

        <main>
            <!-- Current UA Section -->
            <section class="card current-ua">
                <h2>当前浏览器 UserAgent</h2>
                <div class="ua-display">
                    <code id="currentUA"></code>
                    <button class="btn btn-icon" id="copyCurrentUA" title="复制">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                </div>
            </section>

            <!-- Input Section -->
            <section class="card input-section">
                <h2>输入 UserAgent</h2>
                <textarea id="uaInput" placeholder="粘贴 UserAgent 字符串进行解析..."></textarea>
                <div class="btn-group">
                    <button class="btn btn-primary" id="parseBtn">解析</button>
                    <button class="btn btn-secondary" id="clearBtn">清空</button>
                </div>
            </section>

            <!-- Presets Section -->
            <section class="card presets-section">
                <h2>常用 UserAgent 预设</h2>
                <div class="preset-tabs">
                    <button class="preset-tab active" data-category="desktop">桌面浏览器</button>
                    <button class="preset-tab" data-category="mobile">移动浏览器</button>
                    <button class="preset-tab" data-category="crawler">爬虫/机器人</button>
                </div>
                <div class="preset-list" id="presetList"></div>
            </section>

            <!-- Results Section -->
            <section class="card results-section" id="resultsSection" style="display: none;">
                <div class="results-header">
                    <h2>解析结果</h2>
                    <button class="btn btn-secondary btn-small" id="copyResults">复制全部</button>
                </div>
                <div class="results-grid">
                    <div class="result-item">
                        <div class="result-icon browser-icon">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <circle cx="12" cy="12" r="4"></circle>
                                <line x1="21.17" y1="8" x2="12" y2="8"></line>
                                <line x1="3.95" y1="6.06" x2="8.54" y2="14"></line>
                                <line x1="10.88" y1="21.94" x2="15.46" y2="14"></line>
                            </svg>
                        </div>
                        <div class="result-content">
                            <span class="result-label">浏览器</span>
                            <span class="result-value" id="browserResult">-</span>
                        </div>
                    </div>

                    <div class="result-item">
                        <div class="result-icon os-icon">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                                <line x1="8" y1="21" x2="16" y2="21"></line>
                                <line x1="12" y1="17" x2="12" y2="21"></line>
                            </svg>
                        </div>
                        <div class="result-content">
                            <span class="result-label">操作系统</span>
                            <span class="result-value" id="osResult">-</span>
                        </div>
                    </div>

                    <div class="result-item">
                        <div class="result-icon device-icon">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                                <line x1="12" y1="18" x2="12.01" y2="18"></line>
                            </svg>
                        </div>
                        <div class="result-content">
                            <span class="result-label">设备类型</span>
                            <span class="result-value" id="deviceResult">-</span>
                        </div>
                    </div>

                    <div class="result-item">
                        <div class="result-icon engine-icon">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="3"></circle>
                                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                            </svg>
                        </div>
                        <div class="result-content">
                            <span class="result-label">渲染引擎</span>
                            <span class="result-value" id="engineResult">-</span>
                        </div>
                    </div>
                </div>

                <div class="raw-ua">
                    <span class="raw-label">原始 UserAgent:</span>
                    <code id="rawUA"></code>
                </div>
            </section>
        </main>

        <footer>
            <p>UserAgent 解析器 - 开发者工具</p>
        </footer>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast">已复制到剪贴板</div>

    <script src="script.js"></script>
</body>
</html>
