<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVSS Calculator</title>
    <link rel="stylesheet" href="style.css">
    <!-- html2canvas for PNG export -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
    <!-- 背景动画 -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="app-container">
        <!-- 顶部工具栏 -->
        <header class="toolbar">
            <div class="toolbar-left">
                <div class="app-title">
                    <span class="title-icon">🛡️</span>
                    <span data-i18n="app.title">CVSS Calculator</span>
                </div>
            </div>

            <div class="toolbar-center">
                <!-- 版本选择器 -->
                <div class="version-switch">
                    <button class="version-btn active" data-version="3.1">3.1</button>
                    <button class="version-btn" data-version="3.0">3.0</button>
                    <button class="version-btn" data-version="4.0">4.0</button>
                </div>

                <!-- 语言选择器 -->
                <div class="lang-switch">
                    <button class="lang-btn active" data-lang="zh">中文</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="de">DE</button>
                </div>
            </div>

            <div class="toolbar-right">
                <button class="action-btn danger" id="resetBtn">
                    <span>↺</span>
                    <span data-i18n="ui.reset">Reset</span>
                </button>
                <button class="action-btn" id="exportPdfBtn">
                    <span>📄</span>
                    <span data-i18n="ui.exportPDF">Export PDF</span>
                </button>
                <button class="action-btn primary" id="exportPngBtn">
                    <span>🖼️</span>
                    <span data-i18n="ui.exportPNG">Export PNG</span>
                </button>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 左侧：指标选择 -->
            <div class="glass-panel metrics-panel">
                <div class="panel-header">
                    <span class="panel-title" data-i18n="ui.metricSelection">Metric Selection</span>
                    <span class="group-progress" id="progressIndicator">0/8</span>
                </div>
                <div class="panel-content" id="metricsContainer">
                    <!-- 指标组将由 JavaScript 动态生成 -->
                </div>
            </div>

            <!-- 右侧：分数显示 -->
            <div class="score-panel" id="scorePanel">
                <!-- Base Score -->
                <div class="score-card">
                    <div class="score-title" data-i18n="scores.baseScore">Base Score</div>
                    <div class="score-gauge">
                        <svg viewBox="0 0 100 100">
                            <circle class="bg-circle" cx="50" cy="50" r="42"/>
                            <circle class="progress-circle" id="baseGaugeCircle" cx="50" cy="50" r="42"
                                    stroke-dasharray="264" stroke-dashoffset="264"/>
                        </svg>
                        <div class="gauge-value">
                            <span class="gauge-number" id="baseScoreValue">0.0</span>
                            <span class="gauge-label" id="baseSeverityLabel">None</span>
                        </div>
                    </div>
                </div>

                <!-- 分数列表 -->
                <div class="glass-panel">
                    <div class="panel-header">
                        <span class="panel-title" data-i18n="ui.scoreSummary">Score Summary</span>
                    </div>
                    <div class="panel-content">
                        <div class="score-list">
                            <div class="score-item">
                                <span class="score-item-label" data-i18n="scores.baseScore">Base Score</span>
                                <span class="score-item-value" id="baseScoreList">0.0</span>
                            </div>
                            <div class="score-item">
                                <span class="score-item-label" data-i18n="scores.temporalScore">Temporal Score</span>
                                <span class="score-item-value" id="temporalScoreList">-</span>
                            </div>
                            <div class="score-item">
                                <span class="score-item-label" data-i18n="scores.environmentalScore">Environmental Score</span>
                                <span class="score-item-value" id="environmentalScoreList">-</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Vector String -->
                <div class="glass-panel">
                    <div class="panel-header">
                        <span class="panel-title" data-i18n="ui.vectorString">Vector String</span>
                    </div>
                    <div class="panel-content">
                        <div class="vector-label">CVSS:3.1</div>
                        <div class="vector-string" id="vectorString">-</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 导出报告模板（用于 PNG 导出） -->
    <div id="exportTemplate" style="display: none; position: absolute; left: -9999px;">
        <div id="reportContent" style="width: 800px; padding: 40px; background: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%); color: white; font-family: -apple-system, sans-serif;">
            <div style="text-align: center; margin-bottom: 30px;">
                <h1 style="font-size: 28px; margin: 0;">🛡️ CVSS Assessment Report</h1>
                <p style="color: rgba(255,255,255,0.6); margin-top: 8px;" id="reportDate"></p>
            </div>

            <div style="display: flex; justify-content: space-around; margin-bottom: 30px;">
                <div style="text-align: center; padding: 20px; background: rgba(255,255,255,0.1); border-radius: 12px; width: 30%;">
                    <div style="font-size: 12px; color: rgba(255,255,255,0.6); text-transform: uppercase;">Base Score</div>
                    <div style="font-size: 36px; font-weight: bold;" id="reportBaseScore">0.0</div>
                    <div style="font-size: 14px; padding: 4px 12px; border-radius: 6px; display: inline-block; margin-top: 8px;" id="reportBaseSeverity">None</div>
                </div>
                <div style="text-align: center; padding: 20px; background: rgba(255,255,255,0.1); border-radius: 12px; width: 30%;">
                    <div style="font-size: 12px; color: rgba(255,255,255,0.6); text-transform: uppercase;">Temporal</div>
                    <div style="font-size: 36px; font-weight: bold;" id="reportTemporalScore">-</div>
                </div>
                <div style="text-align: center; padding: 20px; background: rgba(255,255,255,0.1); border-radius: 12px; width: 30%;">
                    <div style="font-size: 12px; color: rgba(255,255,255,0.6); text-transform: uppercase;">Environmental</div>
                    <div style="font-size: 36px; font-weight: bold;" id="reportEnvironmentalScore">-</div>
                </div>
            </div>

            <div style="background: rgba(0,0,0,0.3); border-radius: 10px; padding: 16px; margin-bottom: 20px;">
                <div style="font-size: 12px; color: rgba(255,255,255,0.6); text-transform: uppercase; margin-bottom: 8px;">Vector String</div>
                <div style="font-family: monospace; font-size: 14px; color: #0a84ff; word-break: break-all;" id="reportVector">-</div>
            </div>

            <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
                <thead>
                    <tr style="background: rgba(255,255,255,0.1);">
                        <th style="padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.2);">Metric</th>
                        <th style="padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.2);">Value</th>
                        <th style="padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.2);">Description</th>
                    </tr>
                </thead>
                <tbody id="reportMetricsTable">
                </tbody>
            </table>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
</body>
</html>
