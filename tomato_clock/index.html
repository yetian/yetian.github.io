<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄时钟 | Tomato Clock</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>番茄时钟</h1>
            <p class="subtitle">专注当下，效率加倍</p>
        </header>

        <main>
            <div class="timer-card">
                <div class="timer-ring">
                    <svg class="progress-ring" viewBox="0 0 200 200">
                        <circle class="progress-ring-bg" cx="100" cy="100" r="90"/>
                        <circle class="progress-ring-fill" cx="100" cy="100" r="90"/>
                    </svg>
                    <div class="timer-display">
                        <span class="time" id="timeDisplay">25:00</span>
                        <span class="label" id="statusLabel">准备开始</span>
                    </div>
                </div>

                <div class="time-options" id="timeOptions">
                    <button class="time-btn" data-minutes="5">5 分钟</button>
                    <button class="time-btn" data-minutes="10">10 分钟</button>
                    <button class="time-btn active" data-minutes="25">25 分钟</button>
                    <button class="time-btn" data-minutes="30">30 分钟</button>
                    <button class="time-btn" data-minutes="45">45 分钟</button>
                    <button class="time-btn custom-btn" id="customBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        自定义
                    </button>
                </div>

                <div class="custom-input hidden" id="customInput">
                    <input type="number" id="customMinutes" min="1" max="120" placeholder="分钟">
                    <button id="confirmCustom">确定</button>
                </div>

                <div class="controls">
                    <button class="control-btn primary" id="startBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                        开始
                    </button>
                    <button class="control-btn secondary hidden" id="pauseBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="4" width="4" height="16"></rect>
                            <rect x="14" y="4" width="4" height="16"></rect>
                        </svg>
                        暂停
                    </button>
                    <button class="control-btn reset" id="resetBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                            <path d="M3 3v5h5"/>
                        </svg>
                        重置
                    </button>
                </div>
            </div>

            <div class="stats-card">
                <h3>今日统计</h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-value" id="sessionsCount">0</span>
                        <span class="stat-label">完成次数</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="totalMinutes">0</span>
                        <span class="stat-label">专注分钟</span>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>保持专注 · 享受当下</p>
        </footer>
    </div>

    <div class="notification" id="notification">
        <div class="notification-content">
            <span class="notification-icon">🎉</span>
            <span class="notification-text">时间到！</span>
        </div>
    </div>

    <audio id="alarmSound" preload="auto">

    </audio>

    <script src="script.js"></script>
</body>
</html>
