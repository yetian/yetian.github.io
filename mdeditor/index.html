<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 编辑器</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
    <!-- KaTeX for math -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>
    <!-- 背景动画 -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="app-container">
        <!-- 顶部工具栏 -->
        <header class="toolbar">
            <div class="toolbar-left">
                <h1 class="app-title">
                    <span class="title-icon">📝</span>
                    Markdown 编辑器
                </h1>
            </div>
            <div class="toolbar-center">
                <div class="tool-group">
                    <button class="tool-btn" data-action="heading" title="标题">
                        <span>H</span>
                    </button>
                    <button class="tool-btn" data-action="bold" title="加粗">
                        <strong>B</strong>
                    </button>
                    <button class="tool-btn" data-action="italic" title="斜体">
                        <em>I</em>
                    </button>
                    <button class="tool-btn" data-action="strikethrough" title="删除线">
                        <s>S</s>
                    </button>
                </div>
                <div class="tool-divider"></div>
                <div class="tool-group">
                    <button class="tool-btn" data-action="ul" title="无序列表">
                        <span>•</span>
                    </button>
                    <button class="tool-btn" data-action="ol" title="有序列表">
                        <span>1.</span>
                    </button>
                    <button class="tool-btn" data-action="checkbox" title="任务列表">
                        <span>☑</span>
                    </button>
                </div>
                <div class="tool-divider"></div>
                <div class="tool-group">
                    <button class="tool-btn" data-action="link" title="链接">
                        <span>🔗</span>
                    </button>
                    <button class="tool-btn" data-action="image" title="图片">
                        <span>🖼</span>
                    </button>
                    <button class="tool-btn" data-action="code" title="代码">
                        <span>&lt;/&gt;</span>
                    </button>
                    <button class="tool-btn" data-action="codeblock" title="代码块">
                        <span>{ }</span>
                    </button>
                </div>
                <div class="tool-divider"></div>
                <div class="tool-group">
                    <button class="tool-btn" data-action="quote" title="引用">
                        <span>"</span>
                    </button>
                    <button class="tool-btn" data-action="hr" title="分割线">
                        <span>—</span>
                    </button>
                    <button class="tool-btn" data-action="table" title="表格">
                        <span>▤</span>
                    </button>
                </div>
                <div class="tool-divider"></div>
                <div class="tool-group">
                    <button class="tool-btn" data-action="math" title="行内公式">
                        <span>𝑥</span>
                    </button>
                    <button class="tool-btn" data-action="mathblock" title="公式块">
                        <span>Σ</span>
                    </button>
                </div>
            </div>
            <div class="toolbar-right">
                <div class="view-switch">
                    <div class="view-switch-indicator"></div>
                    <button class="view-btn active" data-view="split" title="分屏">▦</button>
                    <button class="view-btn" data-view="preview" title="仅预览">👁</button>
                    <button class="view-btn" data-view="editor" title="仅编辑">✎</button>
                </div>
                <button class="action-btn" id="exportBtn" title="导出">
                    <span>📥</span> 导出
                </button>
                <button class="action-btn primary" id="saveBtn" title="保存">
                    <span>💾</span> 保存
                </button>
            </div>
        </header>

        <!-- 主编辑区 -->
        <main class="editor-main">
            <!-- 编辑器面板 -->
            <div class="editor-panel" id="editorPanel">
                <div class="panel-header">
                    <span class="panel-title">Markdown</span>
                    <div class="panel-actions">
                        <button class="panel-btn" id="clearBtn" title="清空">🗑</button>
                        <button class="panel-btn" id="copyBtn" title="复制">📋</button>
                    </div>
                </div>
                <div class="editor-wrapper">
                    <div class="line-numbers" id="lineNumbers"></div>
                    <textarea id="editor" placeholder="在这里输入 Markdown..."></textarea>
                </div>
                <div class="editor-footer">
                    <span id="charCount">0 字符</span>
                    <span id="wordCount">0 词</span>
                    <span id="lineCount">0 行</span>
                </div>
            </div>

            <!-- 分割线 -->
            <div class="resizer" id="resizer">
                <div class="resizer-handle"></div>
            </div>

            <!-- 预览面板 -->
            <div class="preview-panel" id="previewPanel">
                <div class="panel-header">
                    <span class="panel-title">预览</span>
                    <div class="panel-actions"></div>
                </div>
                <div class="preview-wrapper">
                    <div class="markdown-body" id="preview"></div>
                </div>
            </div>
        </main>

        <!-- 状态栏 -->
        <footer class="status-bar">
            <div class="status-left">
                <span class="status-item" id="saveStatus">已自动保存</span>
            </div>
            <div class="status-right">
                <span class="status-item">支持标准 Markdown + 数学公式</span>
                <span class="status-item">|</span>
                <span class="status-item">行内公式: $...$ | 公式块: $$...$$</span>
            </div>
        </footer>
    </div>

    <!-- 导出弹窗 -->
    <div class="modal" id="exportModal">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h3>导出文档</h3>
                <button class="modal-close" id="closeExportModal">×</button>
            </div>
            <div class="modal-body">
                <div class="export-options">
                    <button class="export-option" data-format="md">
                        <span class="export-icon">📄</span>
                        <span class="export-name">Markdown (.md)</span>
                    </button>
                    <button class="export-option" data-format="html">
                        <span class="export-icon">🌐</span>
                        <span class="export-name">HTML 文档</span>
                    </button>
                    <button class="export-option" data-format="txt">
                        <span class="export-icon">📝</span>
                        <span class="export-name">纯文本 (.txt)</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
