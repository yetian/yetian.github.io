<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>决策分析 | Decision Analyzer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-animation">
        <div class="particles"></div>
    </div>

    <div class="container">
        <header>
            <h1>决策分析</h1>
            <p class="subtitle">明智选择，理性决策</p>
        </header>

        <main>
            <div class="tabs">
                <button class="tab active" data-tab="swot">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="3" y1="9" x2="21" y2="9"/>
                        <line x1="9" y1="9" x2="9" y2="21"/>
                    </svg>
                    SWOT 分析
                </button>
                <button class="tab" data-tab="compare">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="20" x2="18" y2="10"/>
                        <line x1="12" y1="20" x2="12" y2="4"/>
                        <line x1="6" y1="20" x2="6" y2="14"/>
                    </svg>
                    选项对比
                </button>
            </div>

            <!-- SWOT Analysis Panel -->
            <div class="panel active" id="swotPanel">
                <div class="input-group">
                    <input type="text" id="swotTopic" placeholder="输入要分析的主题（ 例如：购买某产品、决定是否做某事）">
                </div>

                <div class="swot-grid">
                    <div class="swot-card strength">
                        <div class="swot-header">
                            <span class="swot-icon">💪</span>
                            <h3>优势 (Strengths)</h3>
                        </div>
                        <textarea id="strengths" placeholder="列出这项选择的优势..."></textarea>
                    </div>

                    <div class="swot-card weakness">
                        <div class="swot-header">
                            <span class="swot-icon">⚠️</span>
                            <h3>劣势 (Weaknesses)</h3>
                        </div>
                        <textarea id="weaknesses" placeholder="列出这项选择的劣势..."></textarea>
                    </div>

                    <div class="swot-card opportunity">
                        <div class="swot-header">
                            <span class="swot-icon">✨</span>
                            <h3>机会 (Opportunities)</h3>
                        </div>
                        <textarea id="opportunities" placeholder="外部环境可能带来的机会..."></textarea>
                    </div>

                    <div class="swot-card threat">
                        <div class="swot-header">
                            <span class="swot-icon">🚨</span>
                            <h3>威胁 (Threats)</h3>
                        </div>
                        <textarea id="threats" placeholder="外部环境可能带来的风险..."></textarea>
                    </div>
                </div>

                <div class="analysis-result" id="swotResult">
                    <h3>📊 分析结论</h3>
                    <div class="result-content" id="swotConclusion">
                        <p class="placeholder">完成 SWOT 分析后，系统将自动生成分析结论</p>
                    </div>
                </div>

                <div class="actions">
                    <button class="btn secondary" id="clearSwot">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        </svg>
                        清空
                    </button>
                    <button class="btn primary" id="analyzeSwot">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                        </svg>
                        生成分析
                    </button>
                </div>
            </div>

            <!-- Comparison Panel -->
            <div class="panel" id="comparePanel">
                <div class="compare-setup" id="compareSetup">
                    <h3>添加要对比的选项</h3>
                    <div class="input-row">
                        <input type="text" id="optionA" placeholder="选项 A（例如：购买 iPhone）">
                        <span class="vs">VS</span>
                        <input type="text" id="optionB" placeholder="选项 B（例如：购买 Android）">
                    </div>
                    <button class="btn primary full" id="startCompare">开始对比</button>
                </div>

                <div class="compare-view hidden" id="compareView">
                    <div class="compare-header">
                        <div class="compare-option option-a">
                            <span class="option-label">选项 A</span>
                            <h2 id="displayOptionA">iPhone</h2>
                        </div>
                        <div class="compare-divider">
                            <span>对比</span>
                        </div>
                        <div class="compare-option option-b">
                            <span class="option-label">选项 B</span>
                            <h2 id="displayOptionB">Android</h2>
                        </div>
                    </div>

                    <div class="factors-list" id="factorsList">
                        <!-- Factors will be added here -->
                    </div>

                    <div class="add-factor">
                        <input type="text" id="newFactor" placeholder="添加新的对比维度（如：价格、性能、外观）">
                        <button class="btn small" id="addFactor">添加</button>
                    </div>

                    <div class="comparison-result">
                        <div class="result-bar">
                            <div class="bar-label">选项 A 得分</div>
                            <div class="bar-container">
                                <div class="bar-fill bar-a" id="barA" style="width: 50%"></div>
                            </div>
                            <div class="bar-score" id="scoreA">50%</div>
                        </div>
                        <div class="result-bar">
                            <div class="bar-label">选项 B 得分</div>
                            <div class="bar-container">
                                <div class="bar-fill bar-b" id="barB" style="width: 50%"></div>
                            </div>
                            <div class="bar-score" id="scoreB">50%</div>
                        </div>
                        <div class="winner" id="winner"></div>
                    </div>

                    <div class="actions">
                        <button class="btn secondary" id="resetCompare">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                                <path d="M3 3v5h5"/>
                            </svg>
                            重新开始
                        </button>
                        <button class="btn primary" id="saveCompare">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                                <polyline points="17,21 17,13 7,13 7,21"/>
                                <polyline points="7,3 7,8 15,8"/>
                            </svg>
                            保存结果
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>三思而后行 · 理性决策</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
